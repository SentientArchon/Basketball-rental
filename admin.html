<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoop It Up — Admin</title>
<style>
  :root {
    --red:     #FF3B3B;
    --red-dim: #cc2e2e;
    --bg:      #11131A;
    --surface: #1a1d28;
    --surface2:#22263a;
    --border:  #2e3347;
    --text:    #f0f2ff;
    --muted:   #8890b0;
    --success: #2adb7a;
    --danger:  #FF3B3B;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Login Screen ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-logo {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .login-logo span { color: var(--red); }

  .login-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .login-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    padding: 14px 16px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--red); }

  .login-btn {
    width: 100%;
    background: var(--red);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    touch-action: manipulation;
  }

  .login-btn:active { background: var(--red-dim); transform: scale(0.98); }

  .login-error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }

  /* ── Dashboard ── */
  #dashboard { display: none; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .topbar-title span { color: var(--red); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .badge-count {
    background: var(--red);
    border-radius: 20px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
  }

  .logout-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 6px 12px;
    touch-action: manipulation;
    transition: color 0.2s;
  }

  .logout-btn:hover { color: var(--text); }

  .main {
    padding: 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .stat-number {
    font-size: 28px;
    font-weight: 900;
    color: var(--red);
    line-height: 1;
  }

  .stat-label {
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--red); }
  .search-input::placeholder { color: var(--muted); }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    padding: 10px 16px;
    touch-action: manipulation;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .refresh-btn:hover { background: var(--surface2); }

  /* ── Booking cards ── */
  #bookings-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .booking-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
    transition: border-color 0.2s;
  }

  .booking-card:hover { border-color: #3e4460; }

  .booking-info { display: flex; flex-direction: column; gap: 6px; }

  .booking-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .booking-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .meta-tag {
    background: var(--surface2);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 3px 8px;
  }

  .meta-tag.highlight {
    background: rgba(255, 59, 59, 0.12);
    color: var(--red);
  }

  .booking-address {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }

  .booking-notes {
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
    margin-top: 2px;
  }

  .submitted-at {
    color: #4a5070;
    font-size: 11px;
    margin-top: 4px;
  }

  .delete-btn {
    background: rgba(255, 59, 59, 0.08);
    border: 1px solid rgba(255, 59, 59, 0.2);
    border-radius: 8px;
    color: var(--red);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    touch-action: manipulation;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
    align-self: center;
  }

  .delete-btn:hover {
    background: rgba(255, 59, 59, 0.18);
    border-color: rgba(255, 59, 59, 0.4);
  }

  .delete-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ── States ── */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .loading-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }

  .spinner {
    display: inline-block;
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Confirm dialog ── */
  .dialog-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .dialog-overlay.open { display: flex; }

  .dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    max-width: 340px;
    width: 100%;
    text-align: center;
  }

  .dialog-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .dialog-desc {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .dialog-actions {
    display: flex;
    gap: 10px;
  }

  .dialog-cancel {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    padding: 12px;
    touch-action: manipulation;
  }

  .dialog-confirm {
    flex: 1;
    background: var(--red);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    padding: 12px;
    touch-action: manipulation;
    transition: background 0.2s;
  }

  .dialog-confirm:active { background: var(--red-dim); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 12px 20px;
    white-space: nowrap;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error   { border-color: var(--danger);  color: var(--danger); }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-number { font-size: 22px; }
    .main { padding: 16px; }
    .topbar { padding: 14px 16px; }
    .booking-card { padding: 14px 16px; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Hoop <span>It</span> Up</div>
    <div class="login-subtitle">Admin Panel</div>
    <input
      class="login-input"
      id="password-input"
      type="password"
      placeholder="Enter admin password"
      autocomplete="current-password"
    >
    <button class="login-btn" id="login-btn" onclick="login()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-title">Hoop <span>It</span> Up</div>
    <div class="topbar-right">
      <span class="badge-count" id="total-badge">0</span>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">Bookings</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-today">0</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-week">0</div>
        <div class="stat-label">This Week</div>
      </div>
    </div>

    <div class="filters">
      <input
        class="search-input"
        id="search-input"
        type="search"
        placeholder="Search by phone, address, or notes…"
        oninput="renderBookings()"
      >
      <button class="refresh-btn" onclick="loadBookings()">↻ Refresh</button>
    </div>

    <div id="bookings-list"></div>
  </div>
</div>

<!-- Confirm Delete Dialog -->
<div class="dialog-overlay" id="confirm-dialog">
  <div class="dialog">
    <div class="dialog-title">Delete Booking?</div>
    <div class="dialog-desc" id="dialog-desc">This will permanently remove the booking from the database.</div>
    <div class="dialog-actions">
      <button class="dialog-cancel" onclick="closeDialog()">Cancel</button>
      <button class="dialog-confirm" id="dialog-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let token = null
  let allBookings = []
  let pendingDeleteId = null

  // ── Auth ────────────────────────────────────────────────────
  async function login() {
    const pw = document.getElementById('password-input').value.trim()
    const errEl = document.getElementById('login-error')
    const btn = document.getElementById('login-btn')

    if (!pw) { errEl.textContent = 'Please enter a password.'; return }

    btn.textContent = 'Signing in…'
    btn.disabled = true
    errEl.textContent = ''

    try {
      const res = await fetch('/api/admin/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      })
      const data = await res.json()

      if (!res.ok) {
        errEl.textContent = data.error || 'Incorrect password.'
        return
      }

      token = data.token
      sessionStorage.setItem('admin_token', token)
      showDashboard()
    } catch {
      errEl.textContent = 'Network error. Please try again.'
    } finally {
      btn.textContent = 'Sign In'
      btn.disabled = false
    }
  }

  function logout() {
    token = null
    sessionStorage.removeItem('admin_token')
    document.getElementById('dashboard').style.display = 'none'
    document.getElementById('login-screen').style.display = 'flex'
    document.getElementById('password-input').value = ''
  }

  // Allow Enter key on password field
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login()
  })

  // ── Dashboard ───────────────────────────────────────────────
  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none'
    document.getElementById('dashboard').style.display = 'block'
    loadBookings()
  }

  async function loadBookings() {
    const list = document.getElementById('bookings-list')
    list.innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div>Loading bookings…</div>
      </div>`

    try {
      const res = await fetch('/api/admin/bookings', {
        headers: { 'Authorization': 'Bearer ' + token }
      })

      if (res.status === 401) { logout(); return }

      const data = await res.json()
      allBookings = data.bookings || []
      updateStats()
      renderBookings()
    } catch {
      list.innerHTML = `<div class="empty-state"><div>Failed to load bookings.</div></div>`
    }
  }

  function updateStats() {
    const now = new Date()
    const todayStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })

    const startOfWeek = new Date(now)
    startOfWeek.setDate(now.getDate() - now.getDay())
    startOfWeek.setHours(0,0,0,0)

    let todayCount = 0
    let weekCount  = 0

    allBookings.forEach(b => {
      const submitted = new Date(b.submittedAt)
      if (submitted.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) === todayStr) todayCount++
      if (submitted >= startOfWeek) weekCount++
    })

    document.getElementById('stat-total').textContent = allBookings.length
    document.getElementById('stat-today').textContent = todayCount
    document.getElementById('stat-week').textContent  = weekCount
    document.getElementById('total-badge').textContent = allBookings.length
  }

  function renderBookings() {
    const query   = (document.getElementById('search-input').value || '').toLowerCase()
    const list    = document.getElementById('bookings-list')
    const filtered = allBookings.filter(b => {
      if (!query) return true
      return (
        (b.phone    || '').toLowerCase().includes(query) ||
        (b.address  || '').toLowerCase().includes(query) ||
        (b.notes    || '').toLowerCase().includes(query) ||
        (b.date     || '').toLowerCase().includes(query) ||
        (b.time     || '').toLowerCase().includes(query)
      )
    })

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🏀</div>
          <div>${allBookings.length === 0 ? 'No bookings yet.' : 'No bookings match your search.'}</div>
        </div>`
      return
    }

    list.innerHTML = filtered.map(b => {
      const id = b._id
      const submitted = b.submittedAt
        ? new Date(b.submittedAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })
        : ''
      const notesHtml = b.notes
        ? `<div class="booking-notes">📝 ${escHtml(b.notes)}</div>`
        : ''

      return `
        <div class="booking-card" id="card-${id}">
          <div class="booking-info">
            <div class="booking-name">${escHtml(b.phone)}</div>
            <div class="booking-meta">
              <span class="meta-tag highlight">${escHtml(b.date)}</span>
              <span class="meta-tag highlight">${escHtml(b.time)}</span>
            </div>
            <div class="booking-address">📍 ${escHtml(b.address)}</div>
            ${notesHtml}
            <div class="submitted-at">Submitted ${submitted}</div>
          </div>
          <button class="delete-btn" onclick="confirmDelete('${id}', '${escAttr(b.phone)}')">Delete</button>
        </div>`
    }).join('')
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }
  function escAttr(str) {
    return String(str || '').replace(/'/g, "\\'")
  }

  // ── Delete flow ─────────────────────────────────────────────
  function confirmDelete(id, phone) {
    pendingDeleteId = id
    document.getElementById('dialog-desc').textContent =
      `This will permanently remove the booking for ${phone}.`
    document.getElementById('confirm-dialog').classList.add('open')
    document.getElementById('dialog-confirm-btn').onclick = () => doDelete(id)
  }

  function closeDialog() {
    document.getElementById('confirm-dialog').classList.remove('open')
    pendingDeleteId = null
  }

  async function doDelete(id) {
    const confirmBtn = document.getElementById('dialog-confirm-btn')
    confirmBtn.textContent = 'Deleting…'
    confirmBtn.disabled = true

    try {
      const res = await fetch('/api/admin/bookings?id=' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      })

      if (res.status === 401) { logout(); return }

      if (!res.ok) {
        showToast('Failed to delete.', 'error')
        return
      }

      allBookings = allBookings.filter(b => b._id !== id)
      updateStats()
      renderBookings()
      showToast('Booking deleted.', 'success')
    } catch {
      showToast('Network error.', 'error')
    } finally {
      closeDialog()
      confirmBtn.textContent = 'Delete'
      confirmBtn.disabled = false
    }
  }

  // Close dialog on overlay click
  document.getElementById('confirm-dialog').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeDialog()
  })

  // ── Toast ────────────────────────────────────────────────────
  let toastTimer = null
  function showToast(msg, type = '') {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.className = 'toast ' + type
    requestAnimationFrame(() => el.classList.add('show'))
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
  }

  // ── Auto-restore session ─────────────────────────────────────
  ;(function() {
    const saved = sessionStorage.getItem('admin_token')
    if (saved) {
      token = saved
      showDashboard()
    }
  })()
</script>
</body>
</html>
